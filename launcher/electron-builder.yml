appId: 'com.foundrymtr.launcher'
productName: 'FoundryMTR Launcher'
artifactName: 'FoundryMTR-Setup-${version}.${ext}'

copyright: 'Copyright (c) 2026 FoundryMC Services LLC'

asar: true
compression: 'maximum'

files:
  - '!{dist,.gitignore,.vscode,docs,dev-app-update.yml,.nvmrc,eslint.config.mjs,electron-install.log}'

extraResources:
  - 'libraries'

# Self-update channel: electron-updater generic provider on Cloudflare R2.
# Channel files (latest*.yml) live at launcher/releases/<platform>/; versioned
# installers live one level down in <version>/ subfolders, so the release step
# rewrites the url/path fields in latest*.yml to <ver>/-prefixed relative paths
# before upload (see docs/HELIOS_CLOUDFLARE_INTEGRATION_PLAN.md section 5).
# Builds NEVER auto-publish — uploads are an explicit, verified release step.

# Windows Configuration
win:
  target:
    - target: 'nsis'
      arch: 'x64'
  publish:
    - provider: 'generic'
      url: 'https://files.foundrymtr.com/launcher/releases/win'

# Windows Installer Configuration
nsis:
  oneClick: false
  perMachine: false
  allowElevation: true
  allowToChangeInstallationDirectory: true

# macOS Configuration
mac:
  target:
    - target: 'dmg'
      arch:
        - 'x64'
        - 'arm64'
  artifactName: 'FoundryMTR-Setup-${version}-${arch}.${ext}'
  category: 'public.app-category.games'
  publish:
    - provider: 'generic'
      url: 'https://files.foundrymtr.com/launcher/releases/mac'

# Linux Configuration
linux:
  target: 'AppImage'
  maintainer: 'FoundryMC Services LLC'
  vendor: 'FoundryMC Services LLC'
  synopsis: 'Modded Minecraft Launcher'
  description: 'Custom launcher which allows users to join modded servers. All mods, configurations, and updates are handled automatically.'
  category: 'Game'
  publish:
    - provider: 'generic'
      url: 'https://files.foundrymtr.com/launcher/releases/linux'


directories:
  buildResources: 'build'
  output: 'dist'
