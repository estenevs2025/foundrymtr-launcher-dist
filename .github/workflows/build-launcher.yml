# Launcher APP build — fires on manual dispatch OR a `launcher-v*` tag push.
# (Tag trigger exists so builds can be started without a GitHub token: pushing
# the tag launcher-v1.0.1 builds Windows + macOS for that ref.)
#
# NOT part of the modpack flow: mod uploads / distribution publishes never
# trigger this. See docs/LAUNCHER_BUILD_CONTRACT.md.
#
# Signing reality (no faking):
#   - Windows: always unsigned NSIS (no Authenticode cert configured).
#   - macOS:   unsigned by default. If MAC_CSC_LINK/MAC_CSC_KEY_PASSWORD repo
#     secrets exist the app is SIGNED; if APPLE_ID/APPLE_APP_SPECIFIC_PASSWORD/
#     APPLE_TEAM_ID also exist electron-builder NOTARIZES automatically.
#     Without them artifacts are honest unsigned test builds.
# R2 publish (optional): needs R2_ACCOUNT_ID/R2_ACCESS_KEY_ID/R2_SECRET_ACCESS_KEY
# and only runs on manual dispatch with publish_to_r2=true. Tag builds always
# stop at GitHub artifacts.

name: build-launcher

on:
  push:
    tags: ['launcher-v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Launcher app version (informational; package.json is authoritative)'
        required: true
        type: string
      channel:
        description: 'Release channel'
        required: true
        type: choice
        options: [stable, beta]
        default: stable
      build_windows:
        type: boolean
        default: true
      build_macos:
        type: boolean
        default: true
      publish_to_r2:
        description: 'Publish to R2 (requires R2_* secrets; never on tag builds)'
        type: boolean
        default: false

defaults:
  run:
    working-directory: launcher

env:
  BUILD_VERSION: ${{ github.event_name == 'push' && github.ref_name || inputs.version }}

jobs:
  windows:
    if: ${{ github.event_name == 'push' || inputs.build_windows }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: launcher/package-lock.json
      - name: Install dependencies (lockfile)
        run: npm ci
      - name: Build NSIS installer (unsigned; never auto-publish)
        run: npx electron-builder --win --x64 --publish never
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer-${{ env.BUILD_VERSION }}
          path: |
            launcher/dist/*.exe
            launcher/dist/*.blockmap
            launcher/dist/latest.yml
          if-no-files-found: error
      - name: Publish to R2 (manual dispatch only, requires secrets)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_to_r2 }}
        shell: pwsh
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          VERSION: ${{ env.BUILD_VERSION }}
        run: |
          if (-not $env:R2_ACCOUNT_ID) { Write-Error 'R2 secrets are not configured; cannot publish.'; exit 1 }
          $endpoint = "https://$env:R2_ACCOUNT_ID.r2.cloudflarestorage.com"
          aws s3 cp dist/ "s3://foundrymtr-files/launcher/releases/win/$env:VERSION/" --recursive --exclude '*' --include '*.exe' --include '*.blockmap' --endpoint-url $endpoint
          (Get-Content dist/latest.yml) -replace '(url|path): (FoundryMTR-Setup-)', ('$1: ' + $env:VERSION + '/$2') | Set-Content dist/latest.fixed.yml
          aws s3 cp dist/latest.fixed.yml "s3://foundrymtr-files/launcher/releases/win/latest.yml" --content-type 'text/yaml' --cache-control 'public, max-age=60, must-revalidate' --endpoint-url $endpoint
      - name: Summary
        shell: pwsh
        run: |
          "## Windows build $env:BUILD_VERSION — UNSIGNED (SmartScreen will warn)" >> $env:GITHUB_STEP_SUMMARY
          "Artifact: windows-installer-$env:BUILD_VERSION (download from this run)" >> $env:GITHUB_STEP_SUMMARY
          "Next: upload installer + .blockmap + rewritten latest.yml to launcher/releases/win/, register in /admin/launcher, Validate, Promote." >> $env:GITHUB_STEP_SUMMARY

  macos:
    if: ${{ github.event_name == 'push' || inputs.build_macos }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: launcher/package-lock.json
      - name: Install dependencies (lockfile)
        run: npm ci
      - name: Build DMGs (signed/notarized ONLY if secrets exist; else unsigned)
        env:
          # Empty secrets leave these env vars empty -> electron-builder skips
          # signing/notarization and produces honest unsigned artifacts.
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ secrets.MAC_CSC_LINK != '' }}
        run: npx electron-builder --mac --x64 --arm64 --publish never
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-installers-${{ env.BUILD_VERSION }}
          path: |
            launcher/dist/*.dmg
            launcher/dist/*.blockmap
            launcher/dist/latest-mac.yml
          if-no-files-found: error
      - name: Publish to R2 (manual dispatch only, requires secrets)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_to_r2 }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          VERSION: ${{ env.BUILD_VERSION }}
        run: |
          if [ -z "$R2_ACCOUNT_ID" ]; then echo 'R2 secrets are not configured; cannot publish.' >&2; exit 1; fi
          endpoint="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          aws s3 cp dist/ "s3://foundrymtr-files/launcher/releases/mac/${VERSION}/" --recursive --exclude '*' --include '*.dmg' --include '*.blockmap' --endpoint-url "$endpoint"
          sed -E "s#(url|path): (FoundryMTR-Setup-)#\1: ${VERSION}/\2#" dist/latest-mac.yml > dist/latest-mac.fixed.yml
          aws s3 cp dist/latest-mac.fixed.yml "s3://foundrymtr-files/launcher/releases/mac/latest-mac.yml" --content-type 'text/yaml' --cache-control 'public, max-age=60, must-revalidate' --endpoint-url "$endpoint"
      - name: Summary (honest signing status)
        env:
          HAS_CERT: ${{ secrets.MAC_CSC_LINK != '' }}
          HAS_NOTARY: ${{ secrets.APPLE_ID != '' }}
        run: |
          if [ "$HAS_CERT" = "true" ] && [ "$HAS_NOTARY" = "true" ]; then S="SIGNED + NOTARIZED";
          elif [ "$HAS_CERT" = "true" ]; then S="SIGNED (not notarized — APPLE_ID secrets missing)";
          else S="UNSIGNED test build (MAC_CSC_LINK secret missing) — right-click > Open required; auto-update will NOT work on macOS"; fi
          echo "## macOS build $BUILD_VERSION — $S" >> "$GITHUB_STEP_SUMMARY"
          echo "Artifact: macos-installers-$BUILD_VERSION" >> "$GITHUB_STEP_SUMMARY"
