# Launcher APP build — manual dispatch only (workflow_dispatch).
#
# This builds the Electron launcher INSTALLERS. It is NOT part of the modpack
# flow: uploading mod jars / publishing distribution.json never triggers this.
# Run it only when the launcher application itself changes (Electron code,
# branding, update-feed config, version bump). See docs/LAUNCHER_BUILD_CONTRACT.md.
#
# R2 publish is optional and only runs when BOTH the publish_to_r2 input is
# true AND the repo has R2 S3 credentials configured as Actions secrets:
#   R2_ACCOUNT_ID, R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY
# Without them the run still produces installer artifacts for manual release.
# Code signing is NOT configured (no certificates) — Windows builds are
# unsigned (SmartScreen warning expected); macOS auto-update requires signing
# and therefore stays a direct-download flow until certificates exist.

name: build-launcher

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Launcher app version being built (informational; package.json is authoritative)'
        required: true
        type: string
      channel:
        description: 'Release channel'
        required: true
        type: choice
        options: [stable, beta]
        default: stable
      build_windows:
        description: 'Build Windows x64 NSIS installer'
        type: boolean
        default: true
      build_macos:
        description: 'Build macOS x64 + arm64 DMGs (unsigned — no auto-update)'
        type: boolean
        default: false
      publish_to_r2:
        description: 'Publish artifacts to R2 (requires R2_* secrets)'
        type: boolean
        default: false
      release_notes:
        description: 'Release notes (recorded in the run summary)'
        type: string
        default: ''

defaults:
  run:
    working-directory: launcher

jobs:
  windows:
    if: ${{ inputs.build_windows }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: launcher/package-lock.json
      - name: Install dependencies (lockfile)
        run: npm ci
      - name: Lint (non-blocking record)
        run: npm run lint --if-present
        continue-on-error: true
      - name: Build NSIS installer (never auto-publish)
        run: npx electron-builder --win --x64 --publish never
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer-${{ inputs.version }}
          path: |
            launcher/dist/*.exe
            launcher/dist/*.blockmap
            launcher/dist/latest.yml
          if-no-files-found: error
      - name: Publish to R2 (optional)
        if: ${{ inputs.publish_to_r2 }}
        shell: pwsh
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          VERSION: ${{ inputs.version }}
        run: |
          if (-not $env:R2_ACCOUNT_ID) { Write-Error 'R2 secrets are not configured; cannot publish.'; exit 1 }
          $endpoint = "https://$env:R2_ACCOUNT_ID.r2.cloudflarestorage.com"
          # Versioned installers under <version>/, channel file at the platform root.
          aws s3 cp dist/ "s3://foundrymtr-files/launcher/releases/win/$env:VERSION/" --recursive --exclude '*' --include '*.exe' --include '*.blockmap' --endpoint-url $endpoint
          # latest.yml must reference the versioned paths; the release runbook
          # rewrites url/path fields to "<version>/<file>" before upload.
          (Get-Content dist/latest.yml) -replace '(url|path): (FoundryMTR-Setup-)', ('$1: ' + $env:VERSION + '/$2') | Set-Content dist/latest.fixed.yml
          aws s3 cp dist/latest.fixed.yml "s3://foundrymtr-files/launcher/releases/win/latest.yml" --content-type 'text/yaml' --cache-control 'public, max-age=60, must-revalidate' --endpoint-url $endpoint
      - name: Run summary
        shell: pwsh
        run: |
          "## Windows build ${{ inputs.version }} (${{ inputs.channel }})" >> $env:GITHUB_STEP_SUMMARY
          "Notes: ${{ inputs.release_notes }}" >> $env:GITHUB_STEP_SUMMARY
          "After download/publish: register the release in /admin/launcher (installer key, latest.yml key, SHA-512 from latest.yml, size), Validate, then Promote to latest." >> $env:GITHUB_STEP_SUMMARY

  macos:
    if: ${{ inputs.build_macos }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: launcher/package-lock.json
      - name: Install dependencies (lockfile)
        run: npm ci
      - name: Build DMGs (unsigned; never auto-publish)
        # CSC_IDENTITY_AUTO_DISCOVERY=false prevents electron-builder from
        # attempting (and failing) signing on the runner.
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npx electron-builder --mac --x64 --arm64 --publish never
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-installers-${{ inputs.version }}
          path: |
            launcher/dist/*.dmg
            launcher/dist/*.blockmap
            launcher/dist/latest-mac.yml
          if-no-files-found: error
      - name: Publish to R2 (optional)
        if: ${{ inputs.publish_to_r2 }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          VERSION: ${{ inputs.version }}
        run: |
          if [ -z "$R2_ACCOUNT_ID" ]; then echo 'R2 secrets are not configured; cannot publish.' >&2; exit 1; fi
          endpoint="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          aws s3 cp dist/ "s3://foundrymtr-files/launcher/releases/mac/${VERSION}/" --recursive --exclude '*' --include '*.dmg' --include '*.blockmap' --endpoint-url "$endpoint"
          sed -E "s#(url|path): (FoundryMTR-Setup-)#\1: ${VERSION}/\2#" dist/latest-mac.yml > dist/latest-mac.fixed.yml
          aws s3 cp dist/latest-mac.fixed.yml "s3://foundrymtr-files/launcher/releases/mac/latest-mac.yml" --content-type 'text/yaml' --cache-control 'public, max-age=60, must-revalidate' --endpoint-url "$endpoint"
