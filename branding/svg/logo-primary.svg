<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" width="320" height="320">
  <!--
    FoundryMTR Launcher Primary Logo
    Roundel-style transit mark with horizontal bar wordmark.
    Use this as logo_320x320.png (export to PNG at 320x320).
  -->
  <defs>
    <style>
      .ring-outer { fill: none; stroke: #E8252B; stroke-width: 22; }
      .ring-inner { fill: #0A0E14; }
      .bar { fill: #E8252B; }
      .wordmark {
        font-family: 'Inter', 'Helvetica Neue', sans-serif;
        font-weight: 900;
        font-size: 42px;
        fill: #F2F4F7;
        letter-spacing: 4px;
      }
      .submark {
        font-family: 'Inter', 'Helvetica Neue', sans-serif;
        font-weight: 500;
        font-size: 10px;
        fill: #F2F4F7;
        letter-spacing: 3px;
      }
    </style>
  </defs>

  <!-- Outer ring -->
  <circle cx="160" cy="160" r="120" class="ring-outer"/>

  <!-- Inner fill -->
  <circle cx="160" cy="160" r="109" class="ring-inner"/>

  <!-- Horizontal bar -->
  <rect x="20" y="140" width="280" height="40" class="bar"/>

  <!-- Wordmark "FOUNDRYMTR" on the bar -->
  <text x="160" y="172" text-anchor="middle" class="wordmark">FOUNDRYMTR</text>

  <!-- Tiny sub-label -->
  <text x="160" y="218" text-anchor="middle" class="submark">RAILWAY · NETWORK</text>
</svg>
